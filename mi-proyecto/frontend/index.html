<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestor de Notas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container mt-5">

    <!-- ====== Registro ====== -->
    <div id="registerSection">
      <h1>Registro</h1><br>
      <form id="registerForm">
        <input type="text" id="username" placeholder="Usuario" class="form-control mb-2" required>
        <input type="password" id="password" placeholder="Contraseña" class="form-control mb-2" required>
        <button id="button" class="btn btn-primary">Registrarse</button>
      </form>
      <p class="mt-2">¿Ya tienes cuenta? <a href="#" id="goLogin">Iniciar sesión</a></p>
    </div>

    <!-- ====== Login ====== -->
    <div id="loginSection" class="hidden">
      <h1>Login</h1><br>
      <form id="loginForm">
        <input type="text" id="loginUser" placeholder="Usuario" class="form-control mb-2" required>
        <input type="password" id="loginPass" placeholder="Contraseña" class="form-control mb-2" required>
        <button type="submit" class="btn btn-success">Iniciar sesión</button>
      </form>
      <p class="mt-2">¿No tienes cuenta? <a href="#" id="goRegister">Registrarse</a></p>
    </div>

    <!-- ====== Notas ====== -->
    <div id="notesSection" class="hidden">
      <h1>Mis Notas</h1><br>
      <textarea id="noteContent" class="form-control mb-2" placeholder="Escribe tu nota"></textarea>
      <button id="addNote" class="btn btn-primary">Añadir Nota</button>

      <h3 class="mt-4">Notas guardadas</h3>
      <ul id="notesList" class="list-group mb-3"></ul>

      <button id="logout" class="btn btn-danger mb-3">Cerrar sesión</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
