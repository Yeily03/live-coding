<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Gestor de Notas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1>Registro</h1><br>
    <form id="registerForm">
      <input type="text" id="username" placeholder="Usuario" class="form-control mb-2" required>
      <br>
      <input type="password" id="password" placeholder="Contraseña" class="form-control mb-2" required>
      <br>
      <button id="button" class="btn btn-primary">Registrarse</button>
    </form>
  </div>
  <script src="script.js"></script>
</body>
</html>
