<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1>Mis Notas</h1><br>
    <textarea id="noteContent" class="form-control mb-2" placeholder="Escribe tu nota"></textarea>
    <button id="addNote" class="btn btn-primary">Añadir Nota</button>

    <h3 class="mt-4">Notas guardadas</h3>
    <ul id="notesList" class="list-group mb-3"></ul>

    <button id="logout" class="btn btn-danger mb-3">Cerrar sesión></button>
  </div>

  <script src="script.js"></script>
</body>
</html>
