<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Gestor de Notas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1>Login</h1><br>
    <form id="loginForm">
      <input type="text" id="loginUser" placeholder="Usuario" class="form-control mb-2" required>
      <br>
      <input type="password" id="loginPass" placeholder="Contraseña" class="form-control mb-2" required>
      <br>
      <button type="submit" class="btn btn-success">Iniciar sesión</button>
    </form>
  </div>

<script src="script.js"></script>
</body>
</html>
